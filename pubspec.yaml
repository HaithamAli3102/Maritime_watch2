name: maritime_watch
description: "Citizen reporting app for restricted maritime zones — Marine Department of Tanzania"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  geolocator: ^14.0.3

  # Automatic location — IP-based, no GPS permission dialog
  http: ^1.2.1

  # Camera / gallery photo capture
  image_picker: ^1.1.2

  # State management — simple, no boilerplate
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
